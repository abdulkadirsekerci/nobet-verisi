<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNLÜK NÖBET ÇİZELGESİ</title>
    <style>
        /* TV Box İçin Full HD Tasarım */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #tarih-baslik {
            font-size: 3.5rem;
            color: #00d4ff;
            margin-bottom: 25px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        table {
            width: 90%;
            background: #0a0a0a;
            border-collapse: collapse;
            border: 4px solid #333;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        th, td {
            padding: 25px 40px;
            font-size: 3rem;
            border-bottom: 1px solid #222;
        }

        th {
            background-color: #1a1a1a;
            color: #00d4ff;
            text-align: left;
            width: 40%;
            text-transform: uppercase;
        }

        td {
            color: #ffffff;
            font-weight: 800;
            text-align: left;
        }

        tr:last-child th, tr:last-child td {
            border-bottom: none;
        }

        .hata {
            font-size: 4rem;
            color: #ff4444;
            padding: 50px;
        }
    </style>
</head>
<body>

    <div id="tarih-baslik">YÜKLENİYOR...</div>
    
    <table id="nobet-tablosu">
        </table>

    <script>
        // Senin verdiğin son güncel link
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSfQalRVQ1BeN02-dQkHNTL-RtoImYh1qO_eaM1mtFdP3TSjDc_wOzlxsfQL7as4uYIhvA9kdmustkK/pub?output=csv';

        async function veriyiGetir() {
            try {
                // Bugünün tarihini GG.AA.YYYY formatında al (Örn: 15.04.2026)
                const simdi = new Date();
                const gun = String(simdi.getDate()).padStart(2, '0');
                const ay = String(simdi.getMonth() + 1).padStart(2, '0');
                const yil = simdi.getFullYear();
                const bugunStr = `${gun}.${ay}.${yil}`;

                document.getElementById('tarih-baslik').innerText = bugunStr + " NÖBETÇİ LİSTESİ";

                // Google'dan CSV verisini çek
                const response = await fetch(csvUrl + '&cache=' + new Date().getTime());
                const text = await response.text();
                
                const satirlar = text.split(/\r?\n/);
                const basliklar = satirlar[0].split(',');
                
                let bulundu = false;
                let tabloHTML = "";

                // Satırları tara
                for (let i = 1; i < satirlar.length; i++) {
                    const sutunlar = satirlar[i].split(',');
                    const satirTarihi = sutunlar[0] ? sutunlar[0].trim() : "";

                    // Eğer Excel'deki tarih bugüne eşitse
                    if (satirTarihi === bugunStr) {
                        // Nöbet yerlerini döngüye al (3. sütundan başla: Bahçe, Zemin vb.)
                        for (let j = 2; j < basliklar.length; j++) {
                            if (basliklar[j].trim() !== "") {
                                tabloHTML += `
                                    <tr>
                                        <th>${basliklar[j].replace(/"/g, '')}</th>
                                        <td>${(sutunlar[j] || '-').replace(/"/g, '')}</td>
                                    </tr>`;
                            }
                        }
                        bulundu = true;
                        break;
                    }
                }

                if (!bulundu) {
                    document.getElementById('nobet-tablosu').innerHTML = '<tr><td class="hata">BUGÜN İÇİN KAYIT BULUNAMADI</td></tr>';
                } else {
                    document.getElementById('nobet-tablosu').innerHTML = tabloHTML;
                }

            } catch (hata) {
                console.error(hata);
                document.getElementById('nobet-tablosu').innerHTML = '<tr><td class="hata">BAĞLANTI HATASI! LÜTFEN İNTERNETİ KONTROL EDİN.</td></tr>';
            }
        }

        // Sayfa açıldığında çalıştır
        veriyiGetir();
        
        // TV sürekli açık kalacağı için her 1 saatte bir (3600000 ms) veriyi tazele
        setInterval(veriyiGetir, 3600000);
    </script>
</body>
</html>
